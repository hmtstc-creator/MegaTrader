<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>MegaTrader AI</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 16px}
textarea{width:100%;height:160px;font-size:15px;padding:10px}
button{padding:10px 20px;margin-top:10px;cursor:pointer}
pre{background:#f5f5f5;padding:15px;white-space:pre-wrap;min-height:120px}
</style>
</head>
<body>

<h2>MegaTrader AI</h2>

<textarea id="msg" placeholder="İsteği yaz..."></textarea>
<br>
<button onclick="gonder()">Gönder</button>

<h3>Cevap</h3>
<pre id="sonuc"></pre>

<script>
async function gonder() {
    const sonuc = document.getElementById("sonuc");

    sonuc.textContent = "Yükleniyor...";

    try {
        const response = await fetch("/api/status");
        const data = await response.json();
        sonuc.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
        sonuc.textContent = e.toString();
    }
}
</script>


</body>
</html>
