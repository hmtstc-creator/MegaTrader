<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MegaTrader AI</title>
<style>
body{font-family:Arial;max-width:900px;margin:40px auto}
textarea{width:100%;height:150px}
button{padding:10px 20px;margin-top:10px}
pre{background:#f5f5f5;padding:15px;white-space:pre-wrap}
</style>
</head>
<body>

<h2>MegaTrader AI</h2>

<textarea id="msg" placeholder="İsteği yaz..."></textarea>
<br>
<button onclick="gonder()">Gönder</button>

<h3>Cevap</h3>
<pre id="sonuc"></pre>

<script>
async function gonder() {

    const message = document.getElementById("msg").value;

    const r = await fetch(
        "http://178.105.40.99:5678/webhook/ai-dev",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:message
            })
        }
    );

    const data = await r.text();

    document.getElementById("sonuc").textContent = data;
}
</script>

</body>
</html>
